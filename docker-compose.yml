services:

 db:
   image: postgres:16
   container_name: workspace_db
   restart: always

   environment:
     POSTGRES_DB: ${DB_NAME}
     POSTGRES_USER: ${DB_USER}
     POSTGRES_PASSWORD: ${DB_PASSWORD}

   ports:
     - "5432:5432"

   volumes:
     - postgres_data:/var/lib/postgresql/data

 redis:
   image: redis:7
   container_name: workspace_redis
   restart: always

   ports:
     - "6379:6379"

 web:
   build: .
   container_name: workspace_web
   restart: always

   command: python manage.py runserver 0.0.0.0:8000

   volumes:
     - .:/app

   ports:
     - "8000:8000"

   depends_on:
     - db
     - redis

   env_file:
     - .env

 celery:
   build: .
   container_name: workspace_celery
   restart: always
   command: celery -A config worker -l info

   volumes:
     - .:/app

   depends_on:
     - db
     - redis

   env_file:
     - .env

volumes:
 postgres_data:
